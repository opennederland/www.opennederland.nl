{% for pageTag in include.tags %}
    {% assign tag = site.tags | where: "title", pageTag | first %}
    {% if tag %}
    <a href="{{ tag.url | relative_url }}" class="tag {{ tag.slug }}">
        {% if tag.icon %}
            <i class="fa-solid {{ tag.icon }}" style="margin-right: 5px;"></i>
        {% endif %}
        #{{ tag.title }}
    </a>
    {% else %}
    <a class="tag unknown-theme">{{ pageTag }}</a>
    {% endif %}
{% endfor %}
