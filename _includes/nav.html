<div class="wrapper d-flex items-center" style="justify-content: space-between;">
    
    <div class="nav-container d-flex items-center">
        <ul class="nav-menu d-flex items-center gap-md">
            {% for item in site.data.navigation.main %}
                <li class="nav-item {% if item.sub %}has-submenu{% endif %}">
                    <a href="{{ item.url | relative_url }}" class="nav-link">
                        {{ item.title }}
                        {% if item.sub %}<span class="submenu-arrow">▾</span>{% endif %}
                    </a>
                    
                    {% if item.sub %}
                        <ul class="submenu">
                            {% for subitem in item.sub %}
                                <li>
                                    <a href="{{ subitem.url | relative_url }}">{{ subitem.title }}</a>
                                </li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
        <a href="{{ "/lid-worden/" | relative_url }}" class="font-bold">Lid worden?</a>
        <a href="/cc/" target="_blank" class="cc-logo ml-auto" title="Creative Commons Nederland"></a>
    </div>

    <div class="d-flex items-center gap-md">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Donkere modus inschakelen">
            🌗
        </button>
    </div>
</div>
