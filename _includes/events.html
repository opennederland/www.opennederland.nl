{% assign event_list = include.events %}
{% assign theme_tag = include.tag %}

{% if event_list.size > 0 %}
<div class="initiatives-grid">
    {% for event in event_list %}
    <div class="initiative-card {{ theme_tag | slugify }}">
        <h3>
            <a href="{{ event.url }}" target="_blank" rel="noopener noreferrer">{{ event.title }}</a>
        </h3>
        <span class="year">{{ event.date_string }}</span>

        <div style="margin-top: auto; padding-top: 1em;">
            <a href="{{ '/tags/' | relative_url }}{{ theme_tag | slugify }}/" class="tag {{ theme_tag | slugify }}" style="font-size: 0.75em; padding: 4px 8px;">
                #{{ theme_tag }}
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
