{% assign event_list = include.events | default: page.events %}
{% assign theme_tag = include.tag | default: page.tags[0] %}

{% if event_list %}
<div class="initiatives-grid">
    {% for event in event_list %}
    
    <div class="initiative-card {{ theme_tag | slugify }}">
        
        <h3>
            <a href="{{ event.url }}" target="_blank" rel="noopener noreferrer">{{ event.name }}</a>
        </h3>
        
        <span class="year">{{ event.date }}</span>

        <div style="margin-top: auto; padding-top: 1em;"></div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            {% if event.url %}
                <a href="{{ event.url }}" target="_blank" rel="noopener noreferrer" style="font-size: 0.9em; color: #888; text-decoration: none;">
                    Website ↗
                </a>
            {% endif %}
        </div>
        
    </div>

    {% endfor %}
</div>
{% endif %}
